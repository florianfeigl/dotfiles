# basic settings
set -g prefix C-b
set -g status-position top
set -g default-terminal "tmux-256color"
set-option -ga terminal-overrides ",tmux-256color:Tc"
# Kitty keyboard protocol (required for Ctrl+Shift combos in TUI apps like OpenCode)
set -g extended-keys on
set -g allow-passthrough on
set -ga terminal-features "tmux-256color:extkeys"
# vim-likeness
setw -g mode-keys vi
bind -n M-h select-pane -L    # left
bind -n M-j select-pane -D    # down
bind -n M-k select-pane -U    # up
bind -n M-l select-pane -R    # right
bind -n M-H previous-window
bind -n M-L next-window
# copy-mode
set-window-option -g mode-keys vi
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi C-v send-keys -X rectangle-toggle
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
# mouse scrolling
set -g mouse on
# theme
set -g @plugin 'catppuccin/tmux'
set -g @catppuccin_flavor 'macchiato'
# plugins
set -g @plugin 'christoomey/vim-tmux-navigator'
set -g @plugin 'jimeh/tmuxifier'
set -g @plugin 'xamut/tmux-network-bandwidth'
set -g @plugin 'xamut/tmux-weather'
set -g @plugin 'tmux-plugins/tmux-yank'
# package manager
set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'
# Initialize TMUX plugin manager (keep this line at the very bottom of tmux.conf)
run '~/.tmux/plugins/tpm/tpm'
