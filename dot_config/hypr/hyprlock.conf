background {
    monitor = eDP-1
    color = rgba(0, 0, 0, 1.0)
}

label {
    monitor = eDP-1
    text = $TIME
    color = rgba(200, 200, 200, 1.0)
    font_size = 120
    font_family = IosevkaTerm Nerd Font
    position = 0, 120
    halign = center
    valign = center
}

input-field {
    monitor = eDP-1
    size = 200, 50
    outline_thickness = 3
    dots_size = 0.33
    dots_spacing = 0.15
    dots_center = false
    dots_rounding = -1
    dots_text_format =
    outer_color = rgb(151515)
    inner_color = rgb(200, 200, 200)
    font_color = rgb(10, 10, 10)
    font_family = IosevkaTerm Nerd Font
    fade_on_empty = false
    fade_timeout = 1000
    placeholder_text = <i>Password...</i>
    hide_input = false
    rounding = -1
    check_color = rgb(204, 136, 34)
    fail_color = rgb(204, 34, 34)
    fail_text = <i>$FAIL <b>($ATTEMPTS)</b></i>
    capslock_color = -1
    numlock_color = -1
    bothlock_color = -1
    invert_numlock = false
    swap_font_color = false

    position = 0, -60
    halign = center
    valign = center
}
