# Alacritty Configuration (TOML)

[general]
import = [
  "~/.config/alacritty/catppuccin-macchiato.toml",
]
live_config_reload = true

[env]
TERM = "xterm-256color"

[window]
padding = { x = 0, y = 0 }
decorations = "None"
dynamic_padding = true
opacity = 0.95

[font]
size = 16.0

[font.normal]
family = "IosevkaTerm Nerd Font"
style = "Regular"

[scrolling]
history = 10000

[selection]
save_to_clipboard = true

